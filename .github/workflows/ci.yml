name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests (no API key required)
        run: |
          pytest tests/test_validation.py tests/test_memory.py tests/test_models.py -v --tb=short

      - name: Type check (mypy, non-blocking)
        continue-on-error: true
        run: |
          mypy src/hei --ignore-missing-imports || true

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/ts

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  # Golden set tests only run when OPENAI_API_KEY secret is present
  golden:
    name: Golden Set (optional)
    runs-on: ubuntu-latest
    # Skip by default unless the secret exists and you explicitly want it
    if: ${{ false }}
    needs: [python]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run golden set tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          HEI_MODEL: ${{ secrets.HEI_MODEL }}
        run: |
          pytest tests/test_golden.py -v -s --tb=short
